version: "3.8"

services:
  api-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - parking-service
      - booking-service
      - payment-service
      - report-service

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3000"

  parking-service:
    build: ./parking-service
    container_name: parking-service
    ports:
      - "3002:3000"

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "3003:3000"
    depends_on:
      - parking-service

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3004:3000"
    depends_on:
      - booking-service

  report-service:
    build: ./report-service
    container_name: report-service
    ports:
      - "3005:3000"

  frontend:
    image: nginx:latest
    container_name: frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
